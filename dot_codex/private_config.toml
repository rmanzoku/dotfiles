model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"
service_tier = "fast"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[features]
codex_hooks = true
collaboration_modes = true
multi_agent = true

[mcp_servers.pencil]
command = "/Applications/Pencil.app/Contents/Resources/app.asar.unpacked/out/mcp-server-darwin-arm64"
args = [ "--app", "desktop" ]

[projects."/Users/rmanzoku/conductor/repos"]
trust_level = "trusted"

[projects."/Users/rmanzoku/conductor/repos/ow-management-v1"]
trust_level = "trusted"

[projects."/Users/rmanzoku/conductor/repos/changer-all"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true
